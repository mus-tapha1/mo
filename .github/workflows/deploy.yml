name: Deploy Next.js to Pages

on:
  push:
    branches: ["main"]
    # لا يتم تشغيل البناء عند تغيير البيانات أو رفع الصور من لوحة التحكم
    # رسائل الـ commit من لوحة التحكم تبدأ بـ:
    #   "chore: رفع صورة"  — رفع صورة
    #   "data: تحديث البيانات" — تحديث data.json
    # كما نتخطى البناء عند تغيير ملفات البيانات/الصور فقط
    paths-ignore:
      - "site-data/**"
      - "public/uploads/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # تخطي البناء إذا كانت رسالة الـ commit من لوحة التحكم (رفع صورة أو تحديث بيانات)
    if: |
      !(contains(github.event.head_commit.message, 'chore: رفع صورة')) &&
      !(contains(github.event.head_commit.message, 'data: تحديث البيانات')) &&
      !(contains(github.event.head_commit.message, 'chore: upload image')) &&
      !(contains(github.event.head_commit.message, 'data: update'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_GITHUB_TOKEN: ${{ secrets.SITE_GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
